<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>laurins</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #scene-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 450ms ease;
    }

    #mini-game {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      z-index: 6;
      transition: opacity 280ms ease;
    }

    #mini-game.is-fading {
      opacity: 0;
      pointer-events: none;
    }

    .question-card {
      position: relative;
      width: min(620px, calc(100vw - 32px));
      min-height: 230px;
      border-radius: 20px;
      padding: 32px 22px 22px;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
    }

    .question {
      margin: 0 0 24px;
      font-size: clamp(1.3rem, 2.2vw, 2rem);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .button-area {
      position: relative;
      height: 104px;
      width: 100%;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 10px 24px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
      user-select: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    #yes-btn {
      position: absolute;
      left: 34%;
      top: 34px;
      transform: translateX(-50%);
    }

    #no-btn {
      position: absolute;
      left: 66%;
      top: 34px;
      transform: translateX(-50%);
      transition: left 170ms ease, top 170ms ease;
    }

    #message {
      margin-top: 16px;
      min-height: 24px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.96rem;
      letter-spacing: 0.02em;
    }

    #fade-layer {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 700ms ease;
      z-index: 7;
    }

    #fade-layer.is-visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <iframe id="scene-frame" src="world/world.html" title="scene preload"></iframe>

  <main id="mini-game">
    <section class="question-card">
      <h1 class="question">Are you ready to enter?</h1>
      <div class="button-area" id="button-area">
        <button id="yes-btn" class="btn" type="button">YES</button>
        <button id="no-btn" class="btn" type="button">NO</button>
      </div>
      <p id="message"></p>
    </section>
  </main>

  <div id="fade-layer"></div>

  <script>
    const sceneFrame = document.getElementById("scene-frame");
    const miniGame = document.getElementById("mini-game");
    const buttonArea = document.getElementById("button-area");
    const yesBtn = document.getElementById("yes-btn");
    const noBtn = document.getElementById("no-btn");
    const message = document.getElementById("message");
    const fadeLayer = document.getElementById("fade-layer");

    let attemptedNo = false;
    let transitioning = false;

    function moveNoButtonAway(fromX, fromY) {
      const areaRect = buttonArea.getBoundingClientRect();
      const noRect = noBtn.getBoundingClientRect();

      const margin = 8;
      const minX = margin;
      const minY = margin;
      const maxX = areaRect.width - noRect.width - margin;
      const maxY = areaRect.height - noRect.height - margin;

      const currentX = noBtn.offsetLeft;
      const currentY = noBtn.offsetTop;

      const dirX = currentX + noRect.width / 2 - (fromX - areaRect.left);
      const dirY = currentY + noRect.height / 2 - (fromY - areaRect.top);
      const length = Math.max(0.01, Math.hypot(dirX, dirY));

      const push = 74;
      const targetX = currentX + (dirX / length) * push;
      const targetY = currentY + (dirY / length) * push;

      const clampedX = Math.max(minX, Math.min(maxX, targetX));
      const clampedY = Math.max(minY, Math.min(maxY, targetY));

      noBtn.style.left = `${clampedX + noRect.width / 2}px`;
      noBtn.style.top = `${clampedY}px`;
    }

    function dodgeNo(event) {
      if (transitioning) return;
      attemptedNo = true;
      message.textContent = "Nice try 🙂";
      moveNoButtonAway(event.clientX, event.clientY);
    }

    noBtn.addEventListener("mouseenter", dodgeNo);
    noBtn.addEventListener("mousedown", dodgeNo);
    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
      dodgeNo(event);
    });

    buttonArea.addEventListener("mousemove", (event) => {
      if (transitioning) return;
      const rect = noBtn.getBoundingClientRect();
      const dx = event.clientX - (rect.left + rect.width / 2);
      const dy = event.clientY - (rect.top + rect.height / 2);
      const distance = Math.hypot(dx, dy);

      if (distance < 52) {
        dodgeNo(event);
      }
    });

    yesBtn.addEventListener("click", async () => {
      if (transitioning) return;
      transitioning = true;

      message.textContent = attemptedNo
        ? "You won. Entering the scene..."
        : "You trusted immediately. Bold move.";

      yesBtn.disabled = true;
      noBtn.disabled = true;

      await new Promise((resolve) => setTimeout(resolve, 520));

      fadeLayer.classList.add("is-visible");
      await new Promise((resolve) => setTimeout(resolve, 740));

      miniGame.classList.add("is-fading");
      sceneFrame.style.opacity = "1";

      await new Promise((resolve) => setTimeout(resolve, 320));
      fadeLayer.classList.remove("is-visible");
      miniGame.style.display = "none";
    });
  </script>
</body>
</html>
